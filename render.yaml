services:
  # ── Web Service: always-on, APScheduler fires pipeline every 6h ─────────────
  - type: web
    name: applypilot-pipeline
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: uvicorn applypilot.api:app --host 0.0.0.0 --port $PORT

    # Persistent disk: mounts at /data so SQLite + resumes survive redeploys
    disk:
      name: applypilot-data
      mountPath: /data
      sizeGB: 5       # enough for SQLite + thousands of tailored PDFs

    envVars:
      # Secrets — set these in the Render dashboard, NOT here
      - key: OPENAI_API_KEY
        sync: false   # means: set manually in Render UI
      - key: ANTHROPIC_API_KEY
        sync: false   # needed by Claude Code CLI for auto-apply
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false

      # Optional
      - key: CAPSOLVER_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: API_SECRET
        sync: false

      # App config
      - key: APPLYPILOT_DIR
        value: /data
      - key: LLM_MODEL
        value: gpt-5.4-nano
      - key: LLM_FALLBACK_MODEL
        value: gpt-5.4-nano
      - key: CRON_INTERVAL_HOURS
        value: "6"
      - key: CRON_RUN_ON_STARTUP
        value: "true"

      # Chromium headless — no display needed
      - key: CHROME_PATH
        value: /usr/bin/chromium
      - key: DISPLAY
        value: ""
